name: Build NP2 Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo'
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        description: 'Kernel branch'
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig(s), space-separated. Use /name if it is in the kernel root; otherwise arch/arm64/configs/name is used.'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        description: 'Extra config fragments (space-separated, start with / if it is in the kernel root)'
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config vendor/debugfs.config'
      kpm_support:
        description: 'Enable KPM support'
        required: false
        type: boolean
        default: true
      susfs_support:
        description: 'Enable SUSFS support'
        required: false
        type: boolean
        default: true
      susfs_branch:
        description: 'SUSFS branch (also selects patch name)'
        required: false
        type: string
        default: 'gki-android13-5.10'
      extra_patches_dir:
        description: 'Extra patch directory (repo-local)'
        required: false
        type: string
        default: ''
      bbg_support:
        description: 'Enable BBG support'
        required: false
        type: boolean
        default: true
      susfs_force:
        description: 'Force SUSFS patch apply (ignore failures)'
        required: false
        type: boolean
        default: false
      droidspaces_support:
        description: 'Enable Droidspaces-OSS support (GKI 5.10 kABI patches + container configs)'
        required: false
        type: boolean
        default: false
      kernel_type:
        description: 'Kernel type identifier (arter97, NothingOSS, LineageOS)'
        required: false
        type: string
        default: 'LineageOS'

  workflow_call:
    inputs:
      kernel_repo:
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig(s), space-separated. Use /name if it is in the kernel root; otherwise arch/arm64/configs/name is used.'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config vendor/debugfs.config'
      kpm_support:
        required: false
        type: boolean
        default: false
      susfs_support:
        required: false
        type: boolean
        default: true
      susfs_branch:
        required: false
        type: string
        default: 'gki-android13-5.10'
      extra_patches_dir:
        required: false
        type: string
        default: ''
      bbg_support:
        required: false
        type: boolean
        default: false
      susfs_force:
        required: false
        type: boolean
        default: false
      droidspaces_support:
        required: false
        type: boolean
        default: false
      kernel_type:
        required: false
        type: string
        default: 'LineageOS'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KERNEL_DIR: kernel
      ANYKERNEL_DIR: AnyKernel3
      DEFCONFIG: ${{ inputs.kernel_defconfig }}
      DEFCONFIG_FRAGS: ${{ inputs.extra_configs }}
      # CCACHE_DIR is set in the "Configure ccache" step to an absolute path;
      # a literal ~ in this env block is NOT expanded and breaks the cache.
      CCACHE_MAXSIZE: 2G
      CCACHE_SLOPPINESS: time_macros,include_file_mtime
      CCACHE_PATH: /usr/bin
      MAKE_ARGS: >-
        ARCH=arm64
        CROSS_COMPILE=aarch64-linux-gnu-
        CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
        LLVM=1 LLVM_IAS=1
        LD=ld.lld HOSTLD=ld.lld
        CC=clang CXX=clang++
        HOSTCC=clang HOSTCXX=clang++
        O=out

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set build date
        # Colon-free ISO 8601 (UTC) — colons are invalid in filenames on FAT/exFAT/NTFS
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> "$GITHUB_ENV"

      - name: Configure ccache
        run: |
          mkdir -p "$HOME/.ccache"
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev ccache \
            lz4 zip python3 clang llvm lld gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi wget

      - name: Setup ccache
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ inputs.kernel_type || 'LineageOS' }}-${{ hashFiles('Scripts/build_kernel.sh') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ inputs.kernel_type || 'LineageOS' }}-
            ccache-${{ runner.os }}-

      - name: Wire ccache shims into PATH
        run: |
          mkdir -p ~/.local/ccache-shims
          for tool in clang clang++; do
            printf '#!/bin/sh\nexec ccache %s "$@"\n' "$tool" > ~/.local/ccache-shims/$tool
            chmod +x ~/.local/ccache-shims/$tool
          done
          cp ~/.local/ccache-shims/clang ~/.local/ccache-shims/clang-18
          echo "$HOME/.local/ccache-shims" >> "$GITHUB_PATH"

      - name: Setup LLVM toolchain path (arter97 compat)
        if: ${{ contains(inputs.kernel_repo || '', 'arter97/android_kernel_nothing_sm8475') }}
        run: |
          llvm_dir=/home/arter97/android/nathan/llvm-22.1.0-x86_64/bin
          sudo mkdir -p "$llvm_dir"
          for tool in clang clang++ llvm-ar llvm-nm llvm-objdump llvm-objcopy llvm-readelf llvm-strip ld.lld; do
            src=$(command -v "$tool" || true)
            if [ -n "$src" ]; then
              sudo ln -sf "$src" "$llvm_dir/$tool"
            fi
          done

      - name: Clone sources
        run: |
          git clone --depth=1 -b "${{ inputs.kernel_branch || 'lineage-23.2' }}" \
            "${{ inputs.kernel_repo || 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git' }}" \
            "$KERNEL_DIR"

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$ANYKERNEL_DIR"
          rm -rf "$ANYKERNEL_DIR/.git"

      - name: Clone SUSFS
        if: ${{ inputs.susfs_support == true }}
        run: |
          # Pinned: gki-android13-5.10 @ 28619f1263fd (2026-06-22) — no tags exist for this branch
          git clone --depth=1 -b "${{ inputs.susfs_branch || 'gki-android13-5.10' }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git

      - name: Setup SukiSU-Ultra
        run: |
          cd "$KERNEL_DIR"
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s v4.1.3
          git -C KernelSU fetch origin miuix:miuix 2>/dev/null || \
            git -C KernelSU branch miuix HEAD 2>/dev/null || true

      - name: Apply extra patches
        if: ${{ inputs.extra_patches_dir != '' }}
        run: |
          patch_dir="$GITHUB_WORKSPACE/${{ inputs.extra_patches_dir }}"
          if [ ! -d "$patch_dir" ]; then
            echo "Extra patches dir not found: $patch_dir" >&2
            exit 1
          fi
          cd "$KERNEL_DIR"
          while IFS= read -r -d '' patch; do
            echo "Applying $patch"
            patch -p1 < "$patch"
          done < <(find "$patch_dir" -maxdepth 1 -type f \( -name '*.patch' -o -name '*.diff' \) -print0 | sort -z)

      - name: Apply SUSFS patches
        if: ${{ inputs.susfs_support == true }}
        run: |
          cd "$KERNEL_DIR"
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          susfs_patch="../susfs4ksu/kernel_patches/50_add_susfs_in_${{ inputs.susfs_branch || 'gki-android13-5.10' }}.patch"
          if [ "${{ inputs.susfs_force }}" = "true" ]; then
            patch -p1 --force < "$susfs_patch" || echo "Continuing despite patch failure"
          else
            patch -p1 < "$susfs_patch"
          fi

      - name: Apply BBG patches
        if: ${{ inputs.bbg_support == true }}
        run: |
          cd "$KERNEL_DIR"
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: Apply Droidspaces patches
        if: ${{ inputs.droidspaces_support == true }}
        run: |
          # GKI 5.10 kABI fix: SYSVIPC variant 6_7_8 (task_struct reserved slots 6-8 are
          # free on LineageOS sm8475; slot 1 is used by pf_io_worker so 1_2_3 would bootloop)
          # plus the POSIX_MQUEUE padding fix mandatory for kernels <= 5.10.
          patch_dir="$GITHUB_WORKSPACE/patches/droidspaces"
          if [ ! -d "$patch_dir" ]; then
            echo "Droidspaces patches dir not found: $patch_dir" >&2
            exit 1
          fi
          cd "$KERNEL_DIR"
          while IFS= read -r -d '' patch; do
            echo "Applying $patch"
            patch -p1 < "$patch"
          done < <(find "$patch_dir" -maxdepth 1 -type f -name '*.patch' -print0 | sort -z)

      - name: Prepare build scripts
        run: |
          chmod +x Scripts/build_kernel.sh
          chmod +x Scripts/package_anykernel.sh

      - name: Enable swap space
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          if sudo fallocate -l 12G /swapfile; then
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile || echo "Swap not permitted on this runner"
          else
            echo "Swap file allocation failed; continuing without swap"
          fi

      - name: Build kernel
        run: |
          SUSFS_SUPPORT="${{ inputs.susfs_support }}" \
          KPM_SUPPORT="${{ inputs.kpm_support }}" \
          BBG_SUPPORT="${{ inputs.bbg_support }}" \
          DROIDSPACES_SUPPORT="${{ inputs.droidspaces_support }}" \
          Scripts/build_kernel.sh

      - name: ccache stats
        if: always()
        run: ccache -s || true

      - name: Package AnyKernel3
        run: |
          KERNEL_TYPE="${{ inputs.kernel_type || 'LineageOS' }}" \
          BUILD_DATE="${{ env.BUILD_DATE }}" \
          Scripts/package_anykernel.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kernel-${{ inputs.kernel_type || 'LineageOS' }}-NP2-SukiSU-Ultra-${{ env.BUILD_DATE }}
          path: "kernel-${{ inputs.kernel_type || 'LineageOS' }}-NP2-SukiSU-Ultra-${{ env.BUILD_DATE }}.zip"
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ inputs.kernel_type || 'LineageOS' }}-${{ github.run_number }}"
          name: "NP2 Kernel – ${{ inputs.kernel_type || 'LineageOS' }} #${{ github.run_number }}"
          body: |
            **Kernel type:** ${{ inputs.kernel_type || 'LineageOS' }}
            **Branch:** ${{ inputs.kernel_branch || 'lineage-23.2' }}
            **KPM:** ${{ inputs.kpm_support }}  **SUSFS:** ${{ inputs.susfs_support }}  **BBG:** ${{ inputs.bbg_support }}  **Droidspaces:** ${{ inputs.droidspaces_support }}
          files: "kernel-${{ inputs.kernel_type || 'LineageOS' }}-NP2-SukiSU-Ultra-${{ env.BUILD_DATE }}.zip"
          draft: false
          prerelease: false

      - name: Upload .config for debugging
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: config-NP2-SukiSU-Ultra
          path: kernel/out/.config
          retention-days: 1

      - name: Collect .rej files
        if: always()
        id: collect_rej
        run: |
          mkdir -p rej
          found="false"
          while IFS= read -r -d '' f; do
            found="true"
            mkdir -p "rej/$(dirname "$f")"
            cp "$f" "rej/$f"
            orig="${f%.rej}"
            [ -f "$orig" ] && cp "$orig" "rej/$orig"
          done < <(find . -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Upload .rej files
        if: always() && steps.collect_rej.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: rej-NP2-SukiSU-Ultra
          path: rej/
