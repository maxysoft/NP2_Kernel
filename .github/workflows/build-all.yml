name: Test All Builds

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-default:
    name: Build (LineageOS)
    uses: ./.github/workflows/build.yml
    with:
      kernel_type: LineageOS
      kpm_support: true
      susfs_support: true
      bbg_support: true
      susfs_force: false

  build-nothingoss:
    name: Build (NothingOSS)
    uses: ./.github/workflows/build.yml
    with:
      kernel_type: NothingOSS
      kernel_repo: https://github.com/NothingOSS/android_kernel_msm-5.10_nothing_sm8475.git
      kernel_branch: sm8475/b/mr
      kernel_defconfig: gki_defconfig
      extra_configs: vendor/waipio_GKI.config
      susfs_branch: gki-android13-5.10
      kpm_support: true
      susfs_support: true
      susfs_force: false
      bbg_support: true
